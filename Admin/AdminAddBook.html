<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Library | Add Book</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a class="brand" href="../index.html">Online Library</a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../AllBooks.html">Books</a></li>
                <li><a href="../User/SearchBook.html">Search</a></li>
                <li><a href="../User/BorrowBooks.html">Borrow</a></li>
                <li><a href="../User/MyBooks.html">My Books</a></li>
                <li><a href="ManageBook.html">Manage Books</a></li>
                <li><a href="../User/Profile.html">My Profile</a></li>
                <li><a href="../Login.html">Login</a></li>
                <li><a href="../Signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-shell narrow-shell">
        <section class="form-card">
            <p class="eyebrow">Admin Panel</p>
            <h1>Add New Book</h1>
            <form id="add-book-form" class="stack-form" novalidate>
                <label for="add-title">Book Title</label>
                <input id="add-title" name="title" type="text" required>
                <label for="add-author">Author</label>
                <input id="add-author" name="author" type="text" required>
                <label for="add-category">Category</label>
                <input id="add-category" name="category" type="text" required>
                <label for="add-description">Description</label>
                <textarea id="add-description" name="description" rows="4" required></textarea>
                <label for="add-copies">Available Copies</label>
                <input id="add-copies" name="availableCopies" type="number" min="0" required>
                <label for="add-image">Upload Book Image</label>
                <input id="add-image" name="image" type="file" accept="image/*">
                <label class="checkbox-row"><input id="add-active" name="isActive" type="checkbox" checked> Is Active</label>
                <label class="checkbox-row"><input id="add-borrowable" name="canBorrow" type="checkbox" checked> Can User Borrow?</label>
                <p id="add-book-message" class="form-message" aria-live="polite"></p>
                <button class="button button-primary" type="submit">Add Book</button>
            </form>
        </section>
    </main>

    <script src="../js/core.js"></script>
    <script src="../js/shared-navbar.js"></script>
    <script src="../js/AdminAddBook.js"></script>
</body>
</html>
