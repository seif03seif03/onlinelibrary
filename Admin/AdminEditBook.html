<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Library | Edit Book</title>
    <link rel="stylesheet" href="../css/AdminEditBook.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a class="brand" href="../index.html">Online Library</a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../AllBooks.html">Books</a></li>
                <li><a href="../User/SearchBook.html">Search</a></li>
                <li><a href="../User/BorrowBooks.html">Borrow</a></li>
                <li><a href="../User/MyBooks.html">My Books</a></li>
                <li><a href="ManageBook.html">Manage Books</a></li>
                <li><a href="../User/Profile.html">My Profile</a></li>
                <li><a href="../Login.html">Login</a></li>
                <li><a href="../Signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-shell narrow-shell">
        <section class="form-card">
            <p class="eyebrow">Admin Panel</p>
            <h1>Edit Book</h1>
            <form id="edit-book-form" class="stack-form" novalidate>
                <label for="edit-book-id">Book ID</label>
                <input id="edit-book-id" name="id" type="number" value="5" readonly>
                <label for="edit-title">Book Name</label>
                <input id="edit-title" name="title" type="text" value="Fahrenheit 451" required>
                <label for="edit-author">Author</label>
                <input id="edit-author" name="author" type="text" value="Ray Bradbury" required>
                <label for="edit-category">Category</label>
                <input id="edit-category" name="category" type="text" value="Dystopian" required>
                <label for="edit-description">Description</label>
                <textarea id="edit-description" name="description" rows="4" required>A fast dystopian novel where books are outlawed and memory becomes an act of rebellion.</textarea>
                <label for="edit-copies">Available Copies</label>
                <input id="edit-copies" name="availableCopies" type="number" min="0" value="4" required>
                <label class="checkbox-row"><input id="edit-active" name="isActive" type="checkbox" checked> Is Active</label>
                <label class="checkbox-row"><input id="edit-borrowable" name="canBorrow" type="checkbox" checked> Can User Borrow?</label>
                <p id="edit-book-message" class="form-message" aria-live="polite"></p>
                <button class="button button-primary" type="submit">Update Book</button>
            </form>
        </section>
    </main>

    <script src="../js/core.js"></script>
    <script src="../js/shared-navbar.js"></script>
    <script src="../js/AdminEditBook.js"></script>
</body>
</html>
