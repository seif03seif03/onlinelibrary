{% extends 'base.html' %}

{% block content %}
    <main class="page-shell narrow-shell">
        <section class="form-card">
            <p class="eyebrow">Create Account</p>
            {% if error %}
                <p class="form-message form-message-error">{{ error }}</p>
            {% endif %}
            <h1>Join the online library</h1>
            <form id="signup-form" class="stack-form" method="post" action="{% url 'signup' %}">
                {% csrf_token %}
                <label for="signup-username">Username</label>
                <input id="signup-username" name="username" type="text" required>
                <label for="signup-email">Email</label>
                <input id="signup-email" name="email" type="email" required>
                <label for="signup-password">Password</label>
                <input id="signup-password" name="password" type="password" required>
                <label for="signup-confirm-password">Confirm Password</label>
                <input id="signup-confirm-password" name="confirmPassword" type="password" required>
                <label for="signup-address">Address</label>
                <input id="signup-address" name="address" type="text" required>
                <label for="signup-phone">Phone Number</label>
                <input id="signup-phone" name="phone" type="tel" required>
                <p class="form-helper">New accounts are created as regular users. Admin access is managed by the system.</p>
                <p id="signup-message" class="form-message" aria-live="polite"></p>
                <button class="button button-primary" type="submit">Sign Up</button>
            </form>
            <p class="form-helper">Already have an account? <a href="{% url 'login' %}">Login here</a>.</p>
        </section>
    </main>
{% endblock %}
