{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title|default:"Online Library" }}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block head %}{% endblock %}
</head>
<body>
    {% block navbar %}
        {% include "Navbar.html" %}
    {% endblock %}

    {% block content %}{% endblock %}

    {% include "Footer.html" %}
    <script src="{% static 'js/core.js' %}"></script>
</body>
</html>
